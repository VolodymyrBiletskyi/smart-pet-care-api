events {}

http {
    server {
        listen 80;
        server_name smart-pet-care.duckdns.org;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name smart-pet-care.duckdns.org;

        ssl_certificate /etc/letsencrypt/live/smart-pet-care.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/smart-pet-care.duckdns.org/privkey.pem;

        location /scalar/ {
            auth_basic "Restricted API Docs";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://api:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /openapi/ {
            auth_basic "Restricted API Docs";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://api:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location / {
            proxy_pass http://api:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
